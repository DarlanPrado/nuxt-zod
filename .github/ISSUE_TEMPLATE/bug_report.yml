name: Bug report
description: Report a reproducible problem in nuxt-zod
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link a minimal reproduction or provide the smallest code/config example that shows the problem.
      placeholder: https://stackblitz.com/...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: nuxt-zod version
      placeholder: 1.3.2
    validations:
      required: true
  - type: input
    id: nuxt-version
    attributes:
      label: Nuxt version
      placeholder: 4.4.4
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 22.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or stack traces here.
      render: shell
